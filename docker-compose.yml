# Home Theater Manager — management plane.
#
# Phase 1 runs the web UI, API, DB, and the playback control service in mock
# mode. Set HTM_PLAYBACK_DRIVER=ffmpeg for the ffmpeg runner, typically on the
# host with direct access to DeckLink/GPU/audio devices.
#
# Configuration is driven by a .env file (see .env.example).

services:
  frontend:
    build: ./frontend
    image: htm-frontend
    restart: unless-stopped
    env_file: .env
    ports:
      - "443:443"
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: htm-backend
    restart: unless-stopped
    env_file: .env
    environment:
      HTM_SYS_DRM_DIR: /host/sys/class/drm
      HTM_PROC_ASOUND_DIR: /host/proc/asound
      HTM_PROC_TTY_SERIAL_FILE: /host/proc/tty/driver/serial
    volumes:
      - htm-data:/data
      - ${HTM_MEDIA_HOST_PATH:-./media}:${HTM_MEDIA_ROOT:-/mnt/media}:ro
      # Hardware discovery results (deploy/discover.sh) shown in the Settings tab.
      # Backend writes this when Settings -> Re-discover is clicked.
      - ./runtime:/runtime
      # Host hardware views used by in-app rediscovery.
      - /sys:/host/sys:ro
      - /proc:/host/proc:ro
    # Backend is reached only through Caddy; no host port needed.
    expose:
      - "8000"

  # Playback control service. Defaults to mock mode; ffmpeg mode needs host
  # hardware device access in real deployments.
  playback:
    build: ./playback-mock
    image: htm-playback
    restart: unless-stopped
    env_file: .env
    volumes:
      - ${HTM_MEDIA_HOST_PATH:-./media}:${HTM_PLAYBACK_MEDIA_ROOT:-/mnt/media}:ro
      - ./runtime:/runtime:ro
    expose:
      - "9000"

volumes:
  htm-data:
